<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bus Tracking System - Admin Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

    <link href="../../static/css/login.css" th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>
    <!-- Brand Header -->
    <div class="text-center">
        <div class="brand-icon-wrap mx-auto">
            <i class="bi bi-bus-front-fill"></i>
        </div>
        <div class="brand-title">Bus Tracking System</div>
        <div class="brand-subtitle">Admin Panel Login</div>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <!-- Thymeleaf error message -->
        <div th:if="${param.error}" class="alert alert-danger alert-login" role="alert">
            <i class="bi bi-exclamation-circle me-1"></i>
            Invalid email or password. Please try again.
        </div>

        <!-- Thymeleaf logout message -->
        <div th:if="${param.logout}" class="alert alert-success alert-login" role="alert">
            <i class="bi bi-check-circle me-1"></i>
            You have been logged out successfully.
        </div>

        <h4>Welcome Back</h4>
        <p class="subtitle">Enter your credentials to access the admin panel</p>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">

            <!-- CSRF Token (Spring Security) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Email Address -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                    <input type="email"
                           id="email"
                           name="username"
                           class="form-control"
                           placeholder="admin@bustrack.com"
                           th:value="${param.username}"
                           autocomplete="email"
                           required/>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required/>
                    <button type="button" class="btn-toggle-pw" id="togglePassword" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Sign In Button -->
            <button type="submit" class="btn-signin">Log In</button>

        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toggle password visibility -->
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleIcon.classList.toggle('bi-eye', !isPassword);
            toggleIcon.classList.toggle('bi-eye-slash', isPassword);
        });
    </script>

</body>
</html>
